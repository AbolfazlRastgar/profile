<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My personal page</title>

  <style>
    @font-face {
      font-family: 'UbuntuMono';
      src: url('./fonts/UbuntuMono-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'UbuntuMono';
      src: url('./fonts/UbuntuMono-Bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #eaeaea;
      font-family: 'UbuntuMono', monospace;
      font-size: 20px;
      line-height: 1.5;
      padding: 20px 24px 40px;
    }

    #intro {
      border-bottom: 1px solid #1f1f1f;
      padding-bottom: 14px;
      margin-bottom: 14px;
    }

    .line {
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 4px;
    }

    .prompt {
      color: #7CFC00;
    }

    .path {
      color: #6fa8dc;
    }

    .info {
      color: #ffd966;
    }

    .error {
      color: #ff6b6b;
    }

    .link {
      color: #6fa8dc;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }

    #terminal {
      min-height: 50vh;
    }

    .input-line {
      display: flex;
      align-items: baseline;
      white-space: nowrap;
    }

    .prompt-wrap {
      flex: 0 0 auto;
    }

    #commandInput {
      flex: 1 1 auto;
      min-width: 40px;
      background: transparent;
      border: none;
      outline: none;
      color: #ffffff;
      font: inherit;
      padding: 0;
      margin: 0;
      caret-color: #ffffff;
    }

    .echo-command {
      color: #ffffff;
    }
  </style>
</head>

<body>
  <div id="intro">
    <div class="line">
      Welcome to my personal page. Here you can explore my academic and professional background,
      and find my public GitHub projects. Type <span class="info">'help'</span> to get started.
    </div>
  </div>

  <div id="terminal">
    <div id="output"></div>

    <div id="currentLine" class="input-line">
      <span class="prompt-wrap">
        <span class="prompt">abolfazl@linux</span>:<span class="path">~</span>$&nbsp;
      </span>
      <input id="commandInput" type="text" autocomplete="off" autofocus />
    </div>
  </div>

  <script>
    const output = document.getElementById("output");
    const input = document.getElementById("commandInput");
    const currentLine = document.getElementById("currentLine");

    let pendingAction = null;

    const githubUsername = "AbolfazlRastgar";

    const commands = {
      help: [
        "Available commands:",
        "",
        "about      - Professional background",
        "education  - Academic history",
        "resume     - Download my resume",
        "projects   - Show my public GitHub repositories",
        "contact    - Contact information",
        "clear      - Clear the terminal"
      ],

about: [
  "I'm Abolfazl Rastgar, a database and data engineering practitioner focused on",
  "building reliable data systems for real production environments.",
  "",
  "Over the past 4+ years, my work has centered around SQL Server Database Administration,",
  "performance tuning, query optimization, database operations, and large-scale data environments.",
  "",
  "I've also worked with PostgreSQL — my second but very real database love — ClickHouse,",
  "and Elasticsearch, which gives me a broader view of how different data systems behave,",
  "scale, and fail.",
  "",
  "On the data engineering side, I work with ETL processes, data workflows, Kafka, Spark,",
  "Python, SQL, and modern analytics engineering practices.",
  "",
  "",
  "Type 'resume' to download my resume or 'projects' to explore my GitHub repositories."
],

      education: [
        "M.Sc. in Computer Engineering",
        "Iran University of Science and Technology (IUST), Tehran, Iran",
        "Sep 2020 - Dec 2022",
        "Ranked 187 among ~90,000 participants in the national entrance exam"
      ],

      contact: [
        "Email: ablfzl.rstgr@gmail.com",
        "GitHub: https://github.com/AbolfazlRastgar"
      ]
    };

    const downloads = {
      resume: {
        title: "Abolfazl Rastgar Resume",
        file: "./files/abolfazl-rastgar-resume.pdf"
      }
    };

    function printLine(text, className = "") {
      const div = document.createElement("div");
      div.className = `line ${className}`.trim();
      div.textContent = text;
      output.appendChild(div);
    }

    function printHTML(html, className = "") {
      const div = document.createElement("div");
      div.className = `line ${className}`.trim();
      div.innerHTML = html;
      output.appendChild(div);
    }

    function printCommandEcho(command) {
      const div = document.createElement("div");
      div.className = "line";
      div.innerHTML = `<span class="prompt">abolfazl@linux</span>:<span class="path">~</span>$ <span class="echo-command"></span>`;
      div.querySelector(".echo-command").textContent = command;
      output.appendChild(div);
    }

    function triggerDownload(path) {
      const a = document.createElement("a");
      a.href = path;
      a.download = "";
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    async function showGithubRepos() {
      printLine("Loading GitHub repositories...", "info");

      const apiUrl = `https://api.github.com/users/${githubUsername}/repos?sort=updated&direction=desc`;

      try {
        const response = await fetch(apiUrl);

        if (!response.ok) {
          printLine("Could not load GitHub repositories.", "error");
          return;
        }

        const repos = await response.json();

        const filteredRepos = repos.filter(repo =>
          repo.name.toLowerCase() !== "profile" && !repo.fork
        );

        if (!filteredRepos.length) {
          printLine("No public repositories found.");
          return;
        }

        printLine("");
        printLine("My GitHub repositories:");
        printLine("");

        filteredRepos.forEach(repo => {
          printLine(repo.name, "info");

          if (repo.description) {
            printLine(repo.description);
          } else {
            printLine("No description yet.");
          }

          printHTML(
            `URL: <a class="link" href="${repo.html_url}" target="_blank">${repo.html_url}</a>`
          );

          if (repo.language) {
            printLine(`Main language: ${repo.language}`);
          }

          printLine("");
        });

      } catch (error) {
        printLine("Could not connect to GitHub API.", "error");
      }
    }

    function scrollToBottom() {
      currentLine.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    function clearOutput() {
      output.innerHTML = "";
    }

    input.addEventListener("keydown", async function (e) {
      if (e.key !== "Enter") return;

      const rawValue = input.value.trim();
      const value = rawValue.toLowerCase();

      if (!value) return;

      printCommandEcho(rawValue);
      input.value = "";

      if (pendingAction) {
        if (value === "y") {
          triggerDownload(pendingAction.file);
          printLine(`Downloading "${pendingAction.title}"...`, "info");
        } else if (value === "n") {
          printLine("Cancelled.");
        } else {
          printLine("Please enter y or n.", "error");
          scrollToBottom();
          return;
        }

        pendingAction = null;
        scrollToBottom();
        return;
      }

      if (value === "clear") {
        clearOutput();
        scrollToBottom();
        return;
      }

      if (value === "resume") {
        pendingAction = downloads.resume;
        printLine(`Download "${downloads.resume.title}"? (y/n)`, "info");
        scrollToBottom();
        return;
      }

      if (value === "projects") {
        await showGithubRepos();
        scrollToBottom();
        return;
      }

      if (commands[value]) {
        commands[value].forEach(line => printLine(line));
      } else {
        printLine("command not found", "error");
      }

      scrollToBottom();
    });

    window.addEventListener("load", () => {
      input.focus();
      scrollToBottom();
    });

    document.addEventListener("click", () => {
      input.focus();
    });
  </script>
</body>
</html>
