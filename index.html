<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My personal page</title>

<style>
@font-face {
  font-family: 'UbuntuMono';
  src: url('./fonts/UbuntuMono-Regular.ttf') format('truetype');
}

body {
  margin: 0;
  background: #000;
  color: #eaeaea;
  font-family: 'UbuntuMono', monospace;
  padding: 20px;
  font-size: 20px;
}

#intro {
  border-bottom: 1px solid #222;
  padding-bottom: 10px;
  margin-bottom: 10px;
}

.line {
  margin-bottom: 5px;
  white-space: pre-wrap;
}

.prompt {
  color: #7CFC00;
}

.path {
  color: #6fa8dc;
}

.info {
  color: #ffd966;
}

.error {
  color: #ff6b6b;
}

input {
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font: inherit;
  width: 70%;
}
</style>
</head>

<body>

<!-- 🔹 INTRO -->
<div id="intro">
  <div class="line">
    Welcome to my personal page. Here you can explore my academic and professional background,
    and occasionally find some of my projects. Type <span class="info">'help'</span> to get started.
  </div>

  <div class="line">
    <span class="prompt">abolfazl@linux</span>:<span class="path">~</span>$
  </div>
</div>

<!-- 🔹 TERMINAL OUTPUT -->
<div id="terminal"></div>

<!-- 🔹 INPUT -->
<div class="line">
  <span class="prompt">abolfazl@linux</span>:<span class="path">~</span>$ 
  <input id="input" autofocus>
</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("input");

let pendingAction = null;

// 🔹 COMMANDS
const commands = {
  help: [
    "Available commands:",
    "about",
    "education",
    "resume",
    "projects",
    "contact",
    "clear"
  ],

  about: [
    "I'm Abolfazl Rastgar, a Microsoft SQL Server Expert with 4+ years of experience",
    "in database administration, performance tuning, ETL development, and reporting systems.",
    "I have worked with large-scale SQL Server environments, HA/DR architectures,",
    "monitoring systems, and building reliable data pipelines for analytical workloads."
  ],

  education: [
    "M.Sc. in Computer Engineering",
    "Iran University of Science and Technology (IUST), Tehran, Iran",
    "Sep 2020 - Dec 2022"
  ],

  contact: [
    "Email: ablfzl.rstgr@gmail.com"
  ]
};

// 🔹 DOWNLOADS
const downloads = {
  resume: {
    title: "Abolfazl Rastgar Resume",
    file: "./files/abolfazl-rastgar-resume.pdf"
  }
};

// 🔹 PROJECTS (فعلاً نمونه)
const projects = {
  "sql-project": {
    title: "SQL Optimization Case Study",
    file: "./files/sql-project.pdf"
  }
};

// 🔹 PRINT
function printLine(text, cls = "") {
  const div = document.createElement("div");
  div.className = "line " + cls;
  div.textContent = text;
  terminal.appendChild(div);
}

// 🔹 COMMAND ECHO
function echo(cmd) {
  printLine(`abolfazl@linux:~$ ${cmd}`);
}

// 🔹 DOWNLOAD
function triggerDownload(path) {
  const a = document.createElement("a");
  a.href = path;
  a.download = "";
  document.body.appendChild(a);
  a.click();
  a.remove();
}

// 🔹 PROJECT LIST
function showProjects() {
  printLine("Available projects:");
  Object.keys(projects).forEach(p => {
    printLine("- " + p);
  });
  printLine("Type project name to download.");
}

// 🔹 INPUT HANDLER
input.addEventListener("keydown", function(e) {
  if (e.key !== "Enter") return;

  const value = input.value.trim();
  if (!value) return;

  echo(value);
  input.value = "";

  // pending (y/n)
  if (pendingAction) {
    if (value === "y") {
      triggerDownload(pendingAction.file);
      printLine("Downloading...", "info");
    } else {
      printLine("Cancelled.");
    }
    pendingAction = null;
    return;
  }

  // clear
  if (value === "clear") {
    terminal.innerHTML = "";
    return;
  }

  // resume
  if (value === "resume") {
    pendingAction = downloads.resume;
    printLine(`Download "${downloads.resume.title}"? (y/n)`, "info");
    return;
  }

  // projects
  if (value === "projects") {
    showProjects();
    return;
  }

  // project download
  if (projects[value]) {
    pendingAction = projects[value];
    printLine(`Download "${projects[value].title}"? (y/n)`, "info");
    return;
  }

  // normal commands
  if (commands[value]) {
    commands[value].forEach(line => printLine(line));
  } else {
    printLine("command not found", "error");
  }
});
</script>

</body>
</html>
