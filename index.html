<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My personal page</title>

  <style>
    @font-face {
      font-family: 'UbuntuMono';
      src: url('./fonts/UbuntuMono-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    body {
      margin: 0;
      background: #000;
      color: #eaeaea;
      font-family: 'UbuntuMono', monospace;
      font-size: 20px;
      line-height: 1.5;
      padding: 20px 24px 40px;
    }

    #intro {
      border-bottom: 1px solid #1f1f1f;
      padding-bottom: 14px;
      margin-bottom: 14px;
    }

    .line {
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 4px;
    }

    .prompt {
      color: #7CFC00;
    }

    .path {
      color: #6fa8dc;
    }

    .info {
      color: #ffd966;
    }

    .error {
      color: #ff6b6b;
    }

    #terminal {
      min-height: 50vh;
    }

    .input-line {
      display: flex;
      align-items: baseline;
      flex-wrap: nowrap;
      gap: 0;
      white-space: nowrap;
    }

    .prompt-wrap {
      flex: 0 0 auto;
    }

    #commandInput {
      flex: 1 1 auto;
      min-width: 40px;
      background: transparent;
      border: none;
      outline: none;
      color: #ffffff;
      font: inherit;
      padding: 0;
      margin: 0;
      caret-color: #ffffff;
    }

    .echo-command {
      color: #ffffff;
    }

    a {
      color: #8ab4f8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="intro">
    <div class="line">
      Welcome to my personal page. Here you can explore my academic and professional background,
      and occasionally find some of my projects. Type <span class="info">'help'</span> to get started.
    </div>
    <div class="line">
      <span class="prompt">abolfazl@linux</span>:<span class="path">~</span>$
    </div>
  </div>

  <div id="terminal">
    <div id="output"></div>

    <div id="currentLine" class="input-line">
      <span class="prompt-wrap">
        <span class="prompt">abolfazl@linux</span>:<span class="path">~</span>$&nbsp;
      </span>
      <input id="commandInput" type="text" autocomplete="off" autofocus />
    </div>
  </div>

  <script>
    const output = document.getElementById("output");
    const input = document.getElementById("commandInput");
    const currentLine = document.getElementById("currentLine");

    let pendingAction = null;

    const commands = {
      help: [
        "Available commands:",
        "about",
        "education",
        "resume",
        "projects",
        "contact",
        "clear"
      ],

      about: [
        "I'm Abolfazl Rastgar, a Microsoft SQL Server Expert with 4+ years of experience",
        "in SQL Server administration, performance tuning, ETL development, and reporting systems.",
        "My work includes large-scale database environments, HA/DR architecture, monitoring,",
        "query optimization, and building reliable data pipelines for analytical workloads. in my resume you can find more details"
      ],

      education: [
        "M.Sc. in Computer Engineering",
        "Iran University of Science and Technology (IUST), Tehran, Iran",
        "Sep 2020 - Dec 2022 - TOP 0.0001 entrance"
        "Ranked 187 among ~90,000 participants in the national entrance exam"
      ],

      contact: [
        "Email: ablfzl.rstgr@gmail.com"
      ]
    };

    const downloads = {
      resume: {
        title: "Abolfazl Rastgar Resume",
        file: "./files/abolfazl-rastgar-resume.pdf"
      }
    };

    const projects = {
      "sql-project": {
        title: "SQL Optimization Case Study",
        file: "./files/sql-project.pdf"
      }
    };

    function printLine(text, className = "") {
      const div = document.createElement("div");
      div.className = `line ${className}`.trim();
      div.textContent = text;
      output.appendChild(div);
    }

    function printCommandEcho(command) {
      const div = document.createElement("div");
      div.className = "line";
      div.innerHTML = `<span class="prompt">abolfazl@linux</span>:<span class="path">~</span>$ <span class="echo-command"></span>`;
      div.querySelector(".echo-command").textContent = command;
      output.appendChild(div);
    }

    function triggerDownload(path) {
      const a = document.createElement("a");
      a.href = path;
      a.download = "";
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    function showProjects() {
      printLine("Available projects:");
      Object.keys(projects).forEach(key => {
        printLine(`- ${key}`);
      });
      printLine("Type a project name to download it.");
    }

    function scrollToBottom() {
      currentLine.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    function clearOutput() {
      output.innerHTML = "";
    }

    input.addEventListener("keydown", function (e) {
      if (e.key !== "Enter") return;

      const value = input.value.trim();
      if (!value) return;

      printCommandEcho(value);
      input.value = "";

      if (pendingAction) {
        if (value.toLowerCase() === "y") {
          triggerDownload(pendingAction.file);
          printLine(`Downloading "${pendingAction.title}"...`, "info");
        } else if (value.toLowerCase() === "n") {
          printLine("Cancelled.");
        } else {
          printLine("Please enter y or n.", "error");
          scrollToBottom();
          return;
        }

        pendingAction = null;
        scrollToBottom();
        return;
      }

      if (value === "clear") {
        clearOutput();
        scrollToBottom();
        return;
      }

      if (value === "resume") {
        pendingAction = downloads.resume;
        printLine(`Download "${downloads.resume.title}"? (y/n)`, "info");
        scrollToBottom();
        return;
      }

      if (value === "projects") {
        showProjects();
        scrollToBottom();
        return;
      }

      if (projects[value]) {
        pendingAction = projects[value];
        printLine(`Download "${projects[value].title}"? (y/n)`, "info");
        scrollToBottom();
        return;
      }

      if (commands[value]) {
        commands[value].forEach(line => printLine(line));
      } else {
        printLine("command not found", "error");
      }

      scrollToBottom();
    });

    window.addEventListener("load", () => {
      input.focus();
      scrollToBottom();
    });

    document.addEventListener("click", () => {
      input.focus();
    });
  </script>
</body>
</html>
