<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #300a24;
  color: #eeeeec;
  font-family: 'Ubuntu Mono', monospace;
  padding: 20px;
  font-size: 18px;
}

.line {
  margin-bottom: 6px;
}

.prompt {
  color: #8ae234;
}

.path {
  color: #729fcf;
}

input {
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font: inherit;
  width: 70%;
}

.cursor::after {
  content: "_";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div id="terminal"></div>

<div class="line">
  <span class="prompt">abolfazl@ubuntu</span>:<span class="path">~</span>$ 
  <input id="input" autofocus class="cursor">
</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("input");

const intro = [
  "Welcome to mt personal page",
  "Role: Microsoft SQL Server Expert",
  "Type 'help' to start"
];

const commands = {
  help: "about, role, skills, contact, clear",
  about: "Abolfazl Rastgar - SQL Server Expert",
  role: "Microsoft SQL Server Expert",
  skills: "SQL Server | Performance Tuning | Indexing | T-SQL",
  contact: "your@email.com"
};

// تایپ اولیه
async function typeIntro() {
  for (let line of intro) {
    let div = document.createElement("div");
    div.className = "line";
    terminal.appendChild(div);

    for (let char of line) {
      div.textContent += char;
      await new Promise(r => setTimeout(r, 20));
    }
  }
}

typeIntro();

// هندل command
input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const cmd = input.value.trim();

    // نمایش دستور
    let line = document.createElement("div");
    line.className = "line";
    line.innerHTML = `<span class="prompt">abolfazl@ubuntu</span>:<span class="path">~</span>$ ${cmd}`;
    terminal.appendChild(line);

    // جواب
    let output = document.createElement("div");
    output.className = "line";

    if (cmd === "clear") {
      terminal.innerHTML = "";
    } else {
      output.textContent = commands[cmd] || "command not found";
      terminal.appendChild(output);
    }

    input.value = "";
    window.scrollTo(0, document.body.scrollHeight);
  }
});
</script>

</body>
</html>
